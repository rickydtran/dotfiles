name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  darwin:
    runs-on: macos-latest          # Apple Silicon -> aarch64-darwin, matches hosts/ricky.nix
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build the darwin system closure
        run: nix build --print-build-logs '.#darwinConfigurations.ricky.system'

  linux:
    runs-on: ubuntu-latest         # x86_64-linux
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build the shared Home Manager config
        run: |
          # register a throwaway CI host matching the runner, then build it
          printf '{ type = "home"; system = "x86_64-linux"; username = "runner"; }\n' > hosts/runner.nix
          git add hosts/runner.nix
          nix build --print-build-logs '.#homeConfigurations.runner.activationPackage'
